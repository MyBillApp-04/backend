spring.datasource.url=jdbc:h2:mem:mybill_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.orm.jdbc.bind=INFO
spring.flyway.enabled=false
spring.cache.type=simple
spring.mail.host=localhost
spring.mail.port=2525
spring.task.scheduling.enabled=false
firebase.config.json=
jwt.secret=this-is-a-dummy-secret-key-for-testing-purposes-only-make-it-long-enough
app.security.rate-limit.ip-per-minute=3
app.security.rate-limit.user-per-minute=3
app.security.rate-limit.auth-per-minute=2
