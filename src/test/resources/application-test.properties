spring.datasource.url=jdbc:h2:mem:mybill_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.hbm2ddl.column_ordering_strategy=legacy
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.orm.jdbc.bind=INFO
spring.flyway.enabled=false
spring.flyway.placeholders.createExtensionCommand=SELECT 1
spring.flyway.validate-on-migrate=false
spring.cache.type=simple
spring.mail.host=localhost
spring.mail.port=2525
spring.task.scheduling.enabled=false
firebase.config.json=
jwt.secret=this-is-a-dummy-secret-key-for-testing-purposes-only-make-it-long-enough
jwt.expiration=86400000
app.security.rate-limit.ip-per-minute=100
app.security.rate-limit.user-per-minute=100
app.security.rate-limit.auth-per-minute=100
