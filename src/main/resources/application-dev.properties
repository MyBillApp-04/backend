# ===============================
# MYBILL BACKEND - DEV CONFIG
# ===============================

# Database - same env names as Render
#spring.datasource.url=${DB_URL}
#spring.datasource.username=${DB_USERNAME}
#spring.datasource.password=${DB_PASSWORD}
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}


# JPA / Hibernate - DEV
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# The shared dev database can have migration checksums from earlier local
# iterations. Keep production validation strict, but do not block local startup
# on checksum drift in the dev profile.
spring.flyway.validate-on-migrate=false

# JWT - DEV
jwt.secret=${JWT_SECRET:dev-only-local-jwt-secret-please-override-64-chars-minimum-2026}

# Firebase - DEV
firebase.config.json=${FIREBASE_CONFIG_JSON:}

# Logging - DEV
logging.level.org.springframework=INFO
logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:INFO}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:INFO}
logging.level.org.hibernate.orm.jdbc.bind=${HIBERNATE_BIND_LOG_LEVEL:OFF}
logging.level.org.springframework.jdbc.core=${SPRING_JDBC_LOG_LEVEL:INFO}
logging.level.com.mybill.MyBill_Backend=DEBUG

# Flutter web/dev-server origins. Production remains controlled by
# ALLOWED_ORIGINS in application-prod.properties / environment variables.
app.allowed-origins=${ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,http://[::1]:*}
app.security.public-api-docs=${PUBLIC_API_DOCS:true}
