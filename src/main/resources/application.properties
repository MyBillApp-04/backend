# ===============================
# MYBILL BACKEND - COMMON CONFIG
# ===============================

spring.application.name=MyBill_Backend
spring.jackson.time-zone=${APP_TIME_ZONE:Asia/Kolkata}
spring.jpa.properties.hibernate.jdbc.time_zone=${APP_TIME_ZONE:Asia/Kolkata}

# Default profile is dev.
# Local will use dev automatically.
# Render should override this using start command or env:
# SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server
server.port=${PORT:8080}
server.address=0.0.0.0
server.forward-headers-strategy=framework
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
jwt.secret=${JWT_SECRET}


# Database Common
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Common
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# HikariCP Pool
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000

# PostgreSQL prepared statement fix
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preferQueryMode=simple

# JWT Common
jwt.expiration=86400000

# Firebase Common
firebase.config.json=${FIREBASE_CONFIG_JSON:}



# Email / SMTP
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
app.email.from=${APP_EMAIL_FROM:no-reply@mybill.local}
app.email.retry.max-attempts=${EMAIL_RETRY_MAX_ATTEMPTS:3}
app.email.reminders.enabled=${EMAIL_REMINDERS_ENABLED:true}

# Backup
app.backup.provider=${BACKUP_PROVIDER:LOCAL}
app.backup.local-dir=${BACKUP_LOCAL_DIR:backups}
app.backup.bucket=${BACKUP_BUCKET:}
app.backup.enabled=${BACKUP_ENABLED:false}
app.backup.s3.bucket=${AWS_S3_BACKUP_BUCKET:${BACKUP_BUCKET:}}
app.backup.s3.prefix=${AWS_S3_BACKUP_PREFIX:mybill-backups}
app.backup.s3.region=${AWS_REGION:ap-south-1}
app.backup.google-drive.access-token=${GOOGLE_DRIVE_ACCESS_TOKEN:}
app.backup.google-drive.folder-id=${GOOGLE_DRIVE_FOLDER_ID:}

# Cache
spring.cache.type=caffeine
spring.cache.cache-names=dashboardStats
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=5m,recordStats
app.cache.dashboard.ttl-minutes=${DASHBOARD_CACHE_TTL_MINUTES:5}

# API security and throttling
app.security.rate-limit.ip-per-minute=${RATE_LIMIT_IP_PER_MINUTE:120}
app.security.rate-limit.user-per-minute=${RATE_LIMIT_USER_PER_MINUTE:300}
app.security.rate-limit.auth-per-minute=${RATE_LIMIT_AUTH_PER_MINUTE:10}
app.security.require-https=${REQUIRE_HTTPS:false}

# OpenAPI / Swagger UI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.show-actuator=false

# Thymeleaf
spring.thymeleaf.check-template-location=false

# CORS
# Local Flutter web runs use random localhost ports. Production overrides this
# in application-prod.properties and should set ALLOWED_ORIGINS explicitly.
app.allowed-origins=${ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,http://[::1]:*}

# Upload Directory
app.upload-dir=uploads

# Multipart Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.placeholders.createExtensionCommand=CREATE EXTENSION IF NOT EXISTS "uuid-ossp"

spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.jdbc.fetch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=100
server.compression.enabled=true
server.compression.mime-types=application/json,text/plain,text/html
server.compression.min-response-size=1024

# Monitoring
management.endpoints.web.exposure.include=health,info,metrics,prometheus,caches,loggers
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.slo.http.server.requests=50ms,100ms,250ms,500ms,1s,2s
management.metrics.enable.cache=true

# Slow query timing
logging.level.org.hibernate.SQL_SLOW=INFO
logging.level.org.hibernate.stat=INFO

# Micrometer Tracing
management.tracing.enabled=true
management.tracing.sampling.probability=1.0

# Resilience4j Circuit Breakers Configuration
resilience4j.circuitbreaker.instances.stripeService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.stripeService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.stripeService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.stripeService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.stripeService.waitDurationInOpenState=10000

resilience4j.circuitbreaker.instances.emailService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.emailService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.emailService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.emailService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.emailService.waitDurationInOpenState=10000

resilience4j.circuitbreaker.instances.googleDriveService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.googleDriveService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.googleDriveService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.googleDriveService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.googleDriveService.waitDurationInOpenState=10000

# Async Job Queue Alerts Configurations
app.async-jobs.dlq-alert-threshold=${ASYNC_JOBS_DLQ_ALERT_THRESHOLD:10}
