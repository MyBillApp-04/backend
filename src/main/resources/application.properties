# ===============================
# MYBILL BACKEND - COMMON CONFIG
# ===============================

spring.application.name=MyBill_Backend
spring.jackson.time-zone=${APP_TIME_ZONE:Asia/Kolkata}
spring.jpa.properties.hibernate.jdbc.time_zone=${APP_TIME_ZONE:Asia/Kolkata}

# Default profile is dev.
# Local will use dev automatically.
# Render should override this using start command or env:
# SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server
server.port=${PORT:8080}
server.address=0.0.0.0
server.forward-headers-strategy=framework
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
jwt.secret=${JWT_SECRET}


# Database Common
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Common
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# HikariCP Pool
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:1}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:4}
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000

# PostgreSQL prepared statement fix
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preferQueryMode=simple

# JWT Common
jwt.expiration=86400000

# Firebase Common
firebase.config.json=${FIREBASE_CONFIG_JSON:}

# Backup
app.backup.provider=${BACKUP_PROVIDER:LOCAL}
app.backup.local-dir=${BACKUP_LOCAL_DIR:backups}
app.backup.bucket=${BACKUP_BUCKET:}
app.backup.enabled=${BACKUP_ENABLED:false}
app.backup.s3.bucket=${AWS_S3_BACKUP_BUCKET:${BACKUP_BUCKET:}}
app.backup.s3.prefix=${AWS_S3_BACKUP_PREFIX:mybill-backups}
app.backup.s3.region=${AWS_REGION:ap-south-1}
app.backup.google-drive.access-token=${GOOGLE_DRIVE_ACCESS_TOKEN:}
app.backup.google-drive.folder-id=${GOOGLE_DRIVE_FOLDER_ID:}

# Cache
spring.cache.type=caffeine
spring.cache.cache-names=dashboardStats
spring.cache.caffeine.spec=maximumSize=${CACHE_MAX_SIZE:200},expireAfterWrite=5m
app.cache.dashboard.ttl-minutes=${DASHBOARD_CACHE_TTL_MINUTES:5}
app.cache.dashboard.max-size=${DASHBOARD_CACHE_MAX_SIZE:100}
app.cache.business-profiles.max-size=${BUSINESS_PROFILE_CACHE_MAX_SIZE:100}
app.cache.invoice-settings.max-size=${INVOICE_SETTINGS_CACHE_MAX_SIZE:100}

# API security and throttling
app.security.rate-limit.ip-per-minute=${RATE_LIMIT_IP_PER_MINUTE:120}
app.security.rate-limit.user-per-minute=${RATE_LIMIT_USER_PER_MINUTE:300}
app.security.rate-limit.auth-per-minute=${RATE_LIMIT_AUTH_PER_MINUTE:10}
app.security.rate-limit.cache-max-size=${RATE_LIMIT_CACHE_MAX_SIZE:5000}
app.security.jwt-denylist.cache-max-size=${JWT_DENYLIST_CACHE_MAX_SIZE:10000}
app.security.trust-forwarded-headers=${TRUST_FORWARDED_HEADERS:false}
app.security.public-api-docs=${PUBLIC_API_DOCS:false}
app.security.require-https=${REQUIRE_HTTPS:false}

# OpenAPI / Swagger UI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.show-actuator=false

# Thymeleaf
spring.thymeleaf.check-template-location=false

# CORS
# Local Flutter web runs use random localhost ports. Production overrides this
# in application-prod.properties and should set ALLOWED_ORIGINS explicitly.
app.allowed-origins=${ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,http://[::1]:*}

# Upload Directory
app.upload-dir=uploads

# Multipart Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=${MULTIPART_FILE_SIZE_THRESHOLD:64KB}

spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.placeholders.createExtensionCommand=CREATE EXTENSION IF NOT EXISTS "uuid-ossp"

spring.jpa.properties.hibernate.jdbc.batch_size=${HIBERNATE_BATCH_SIZE:25}
spring.jpa.properties.hibernate.jdbc.fetch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=${HIBERNATE_GENERATE_STATISTICS:false}
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=100
server.compression.enabled=true
server.compression.mime-types=application/json,text/plain,text/html
server.compression.min-response-size=1024
server.tomcat.threads.max=${TOMCAT_THREADS_MAX:50}
server.tomcat.threads.min-spare=${TOMCAT_THREADS_MIN_SPARE:4}
server.tomcat.accept-count=${TOMCAT_ACCEPT_COUNT:50}
server.tomcat.max-connections=${TOMCAT_MAX_CONNECTIONS:200}

# Monitoring
management.endpoints.web.exposure.include=health,info,metrics,prometheus,caches,loggers
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=${HTTP_METRICS_HISTOGRAMS:false}
management.metrics.distribution.slo.http.server.requests=50ms,100ms,250ms,500ms,1s,2s
management.metrics.enable.cache=${CACHE_METRICS_ENABLED:false}

# Slow query timing
logging.level.org.hibernate.SQL_SLOW=INFO
logging.level.org.hibernate.stat=${HIBERNATE_STAT_LOG_LEVEL:OFF}

# Micrometer Tracing
management.tracing.enabled=${TRACING_ENABLED:false}
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:0.0}

# Resilience4j Circuit Breakers Configuration
resilience4j.circuitbreaker.instances.stripeService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.stripeService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.stripeService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.stripeService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.stripeService.waitDurationInOpenState=10000

resilience4j.circuitbreaker.instances.googleDriveService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.googleDriveService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.googleDriveService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.googleDriveService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.googleDriveService.waitDurationInOpenState=10000

# Async Job Queue Alerts Configurations
app.async-jobs.dlq-alert-threshold=${ASYNC_JOBS_DLQ_ALERT_THRESHOLD:10}
app.async-jobs.poll-batch-size=${ASYNC_JOBS_POLL_BATCH_SIZE:5}
app.async-jobs.admin-page-size=${ASYNC_JOBS_ADMIN_PAGE_SIZE:100}
app.async-jobs.running-timeout-minutes=${ASYNC_JOBS_RUNNING_TIMEOUT_MINUTES:15}
app.async.core-pool-size=${ASYNC_CORE_POOL_SIZE:2}
app.async.max-pool-size=${ASYNC_MAX_POOL_SIZE:4}
app.async.queue-capacity=${ASYNC_QUEUE_CAPACITY:100}
app.http-client.threads=${HTTP_CLIENT_THREADS:2}
app.notifications.reminders.batch-size=${NOTIFICATION_REMINDER_BATCH_SIZE:100}
