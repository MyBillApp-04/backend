# Override this with ALLOWED_ORIGINS when additional deployed domains are used.
# Development loopback origins belong in the dev profile, never production.
app.allowed-origins=${ALLOWED_ORIGINS:https://mybill-app-04.firebaseapp.com,https://mybill-app-04.web.app}
app.security.require-https=${REQUIRE_HTTPS:true}

spring.jpa.hibernate.ddl-auto=validate
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
