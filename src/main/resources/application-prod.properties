# Override this with ALLOWED_ORIGINS when additional deployed domains are used.
# Local origins are included because Flutter Web debug builds intentionally use
# the Render backend and run on a random localhost port.
app.allowed-origins=${ALLOWED_ORIGINS:https://mybill-app-04.firebaseapp.com,https://mybill-app-04.web.app,http://localhost:*,http://127.0.0.1:*,http://[::1]:*}

spring.jpa.hibernate.ddl-auto=validate
