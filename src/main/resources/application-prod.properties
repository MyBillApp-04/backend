# ===============================
# MYBILL BACKEND - PRODUCTION OVERRIDES
# ===============================

# Override this with ALLOWED_ORIGINS when additional deployed domains are used.
# Development loopback origins belong in the dev profile, never production.
app.allowed-origins=${ALLOWED_ORIGINS:https://mybill-app-04.firebaseapp.com,https://mybill-app-04.web.app}
app.security.require-https=${REQUIRE_HTTPS:true}

spring.main.lazy-initialization=${SPRING_LAZY_INITIALIZATION:true}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.batch_size=${HIBERNATE_BATCH_SIZE:15}
spring.jpa.properties.hibernate.jdbc.fetch_size=${HIBERNATE_FETCH_SIZE:50}

spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:0}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:2}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:20000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:300000}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:20000}

server.tomcat.threads.max=${TOMCAT_THREADS_MAX:24}
server.tomcat.threads.min-spare=${TOMCAT_THREADS_MIN_SPARE:2}
server.tomcat.accept-count=${TOMCAT_ACCEPT_COUNT:25}
server.tomcat.max-connections=${TOMCAT_MAX_CONNECTIONS:100}

spring.servlet.multipart.file-size-threshold=${MULTIPART_FILE_SIZE_THRESHOLD:32KB}

spring.cache.caffeine.spec=maximumSize=${CACHE_MAX_SIZE:100},expireAfterWrite=5m
app.cache.dashboard.max-size=${DASHBOARD_CACHE_MAX_SIZE:50}
app.cache.business-profiles.max-size=${BUSINESS_PROFILE_CACHE_MAX_SIZE:50}
app.cache.invoice-settings.max-size=${INVOICE_SETTINGS_CACHE_MAX_SIZE:50}

app.security.rate-limit.cache-max-size=${RATE_LIMIT_CACHE_MAX_SIZE:2000}
app.security.jwt-denylist.cache-max-size=${JWT_DENYLIST_CACHE_MAX_SIZE:5000}
app.security.trust-forwarded-headers=${TRUST_FORWARDED_HEADERS:true}
app.security.public-api-docs=${PUBLIC_API_DOCS:false}
app.async-jobs.poll-batch-size=${ASYNC_JOBS_POLL_BATCH_SIZE:3}
app.async-jobs.admin-page-size=${ASYNC_JOBS_ADMIN_PAGE_SIZE:50}
app.async-jobs.running-timeout-minutes=${ASYNC_JOBS_RUNNING_TIMEOUT_MINUTES:15}
app.async.core-pool-size=${ASYNC_CORE_POOL_SIZE:1}
app.async.max-pool-size=${ASYNC_MAX_POOL_SIZE:2}
app.async.queue-capacity=${ASYNC_QUEUE_CAPACITY:50}
app.http-client.threads=${HTTP_CLIENT_THREADS:1}
app.notifications.reminders.batch-size=${NOTIFICATION_REMINDER_BATCH_SIZE:50}

management.endpoints.web.exposure.include=health,info
management.metrics.distribution.percentiles-histogram.http.server.requests=false
management.metrics.enable.cache=false
management.tracing.enabled=false

logging.level.org.hibernate.stat=OFF
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.springframework.jdbc.core=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=INFO
logging.level.com.mybill.MyBill_Backend.security.JwtAuthenticationFilter=WARN
