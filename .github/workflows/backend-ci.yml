name: Backend CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Validate Flyway migration sequence
        run: python scripts/validate_migrations.py
      - name: Test
        run: ./mvnw -B test
      - name: Require PostgreSQL integration test
        run: python scripts/verify_postgres_integration.py
      - name: Upload backend coverage
        uses: actions/upload-artifact@v6
        with:
          name: backend-jacoco-coverage
          path: target/site/jacoco/
      - name: Enforce coverage above 80%
        run: COVERAGE_MINIMUM=80 bash scripts/check_coverage.sh target/site/jacoco/jacoco.csv
      - name: Package
        run: ./mvnw -B -DskipTests package

  git-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install and configure git-secrets
        run: |
          git clone --depth 1 https://github.com/awslabs/git-secrets.git /tmp/git-secrets
          sudo make -C /tmp/git-secrets install
          git secrets --register-aws
          git secrets --add '-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----'
          git secrets --add '(gh[pousr]_[A-Za-z0-9_]{30,}|sk_live_[A-Za-z0-9]{20,})'
      - name: Scan tracked files and history
        run: |
          git secrets --scan
          git secrets --scan-history

  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Scan for verified and unknown secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Security Scan
        run: ./mvnw -B -Psecurity-check -DskipTests verify
      - name: Upload dependency scan
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: backend-dependency-check
          path: target/dependency-check-report.*
          if-no-files-found: warn

  container-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate compose file
        run: docker compose -f docker-compose.yml config
      - name: Build hardened backend image
        run: docker build --pull -f Dockerfile .

  sast:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: none
          queries: security-extended
      - uses: github/codeql-action/analyze@v4
        with:
          category: /language:java-kotlin

  performance:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: mybill
          POSTGRES_USER: mybill
          POSTGRES_PASSWORD: mybill
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mybill -d mybill"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Install JMeter
        run: |
          curl --fail --silent --show-error --location \
            https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz \
            | tar -xz
          echo "$PWD/apache-jmeter-5.6.3/bin" >> "$GITHUB_PATH"
      - name: Start backend
        env:
          SPRING_PROFILES_ACTIVE: prod
          DB_URL: jdbc:postgresql://localhost:5432/mybill
          DB_USERNAME: mybill
          DB_PASSWORD: mybill
          FIREBASE_CONFIG_JSON: ''
          FIREBASE_ENABLED: 'false'
          PORT: 8080
        run: |
          export JWT_SECRET
          JWT_SECRET="$(openssl rand -hex 32)"
          ./mvnw -B -DskipTests spring-boot:run > application.log 2>&1 &
          echo $! > application.pid
          for i in {1..60}; do
            curl --fail --silent http://localhost:8080/ping && exit 0
            sleep 2
          done
          cat application.log
          exit 1
      - name: Run JMeter SLA profile
        run: |
          jmeter -n -t load-tests/api-smoke.jmx \
            -JbaseHost=localhost -JbasePort=8080 -Jprotocol=http \
            -Jjmeter.save.saveservice.output_format=csv \
            -l results.jtl
          MAX_P95_MS=500 MAX_ERROR_PERCENT=1 \
            bash load-tests/assert-jmeter-thresholds.sh results.jtl
      - name: Capture Prometheus metrics
        if: always()
        run: curl --fail --silent http://localhost:8080/actuator/prometheus --output metrics.prom
      - name: Upload performance evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: backend-performance-results
          path: |
            results.jtl
            application.log
            metrics.prom
